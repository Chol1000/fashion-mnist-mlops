worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Upstream pool — all backend replicas ──────────────────────────────────
    upstream fashion_api {
        least_conn;                      # route to replica with fewest active connections
        server backend:8000;             # Docker Compose resolves to all replicas
    }

    # ── Main server block ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Increase body size for CSV uploads
        client_max_body_size 50M;

        # Timeouts — generous for model loading on first request
        proxy_connect_timeout  60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # ── API proxy ─────────────────────────────────────────────────────────
        location / {
            proxy_pass         http://fashion_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Streaming support (for Server-Sent Events / long polls)
            proxy_buffering    off;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ── Health endpoint — always route to first available backend ─────────
        location /health {
            proxy_pass         http://fashion_api/health;
            proxy_set_header   Host $host;
            access_log         off;
        }
    }
}
