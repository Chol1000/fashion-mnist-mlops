# ─────────────────────────────────────────────────────────────────────────────
# Fashion MNIST MLOps Stack
# ─────────────────────────────────────────────────────────────────────────────
# Services:
#   backend   — FastAPI prediction & retraining API  (port 8000)
#   frontend  — Streamlit dashboard                   (port 8501)
#   locust    — Load testing UI                       (port 8089)
#
# Usage:
#   docker compose up --build            # start all
#   docker compose up --scale backend=3  # scale API to 3 replicas
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Nginx Load Balancer ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: fashion_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: fashion-mnist-api:latest
    ports:
      - "8000"          # internal only — allows --scale backend=N without port conflicts
    volumes:
      - ./data:/data:ro                # dataset CSVs (read-only)
      - ./models:/app/models           # pre-trained model + metrics (read-write for retrain)
      - api_db:/app/api/data           # SQLite database (persistent)
    environment:
      - PYTHONUNBUFFERED=1
      - TF_CPP_MIN_LOG_LEVEL=2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: fashion-mnist-frontend:latest
    container_name: fashion_frontend
    ports:
      - "8501:8501"
    volumes:
      - ./data:/data:ro                # dataset CSVs for "Load Random Sample"
    environment:
      - API_URL=http://backend:8000
      - PYTHONUNBUFFERED=1
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  locust:
    image: locustio/locust:2.31.5
    container_name: fashion_locust
    ports:
      - "8089:8089"
    volumes:
      - ./locust:/mnt/locust
      - ./data:/mnt/locust/data:ro
    command: -f /mnt/locust/locustfile.py --host http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  api_db:
    name: fashion_api_db
